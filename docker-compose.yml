services:
  chatgpt-api:
    build:
      context: .
    image: chatgpt-api:local
    environment:
      CHATGPT_API_HOST: 0.0.0.0
      CHATGPT_API_PORT: 8000
      CHATGPT_API_KEY: ${CHATGPT_API_KEY:-local-dev-key}
      # Optional local account aliases under secrets/accounts. Leave blank to auto-discover every saved capture.
      CHATGPT_ACCOUNT: ${CHATGPT_ACCOUNT:-}
      CHATGPT_ACCOUNTS: ${CHATGPT_ACCOUNTS:-}
      CHATGPT_ACCOUNT_STRATEGY: ${CHATGPT_ACCOUNT_STRATEGY:-failover}
      CHATGPT_ACCOUNTS_DIR: /data/secrets/accounts
      CHATGPT_IMAGE_OUTPUT_DIR: /data/outputs/chatgpt-images
      CHATGPT_RESEARCH_OUTPUT_DIR: /data/outputs/chatgpt-research
      CHATGPT_ADMIN_DB_PATH: /data/outputs/chatgpt-admin.sqlite
      CHATGPT_PUBLIC_BASE_URL: ${CHATGPT_PUBLIC_BASE_URL:-http://127.0.0.1:8000/v1}
      CHATGPT_AGENT_MODE: ${CHATGPT_AGENT_MODE:-optimized}
      CHATGPT_MODEL_FALLBACK: ${CHATGPT_MODEL_FALLBACK:-auto}
      CHATGPT_TEMPORARY_CHAT: ${CHATGPT_TEMPORARY_CHAT:-true}
      CHATGPT_WEB_TIMEOUT: ${CHATGPT_WEB_TIMEOUT:-5400}
      CHATGPT_CHAT_CONCURRENCY: ${CHATGPT_CHAT_CONCURRENCY:-free=1,go=2,plus=3,pro=4}
      CHATGPT_UPLOAD_CONCURRENCY: ${CHATGPT_UPLOAD_CONCURRENCY:-free=1,go=1,plus=1,pro=1}
      CHATGPT_IMAGE_CONCURRENCY: ${CHATGPT_IMAGE_CONCURRENCY:-free=1,go=1,plus=2,pro=3}
      CHATGPT_RESEARCH_CONCURRENCY: ${CHATGPT_RESEARCH_CONCURRENCY:-free=1,go=1,plus=2,pro=2}
      CHATGPT_CONSOLE_URL: ${CHATGPT_CONSOLE_URL:-http://127.0.0.1:8080}
      CHATGPT_CONSOLE_COMMAND: ${CHATGPT_CONSOLE_COMMAND:-docker compose up -d bridge-console}
    ports:
      - "${CHATGPT_API_PORT:-8000}:8000"
    volumes:
      - ./secrets/accounts:/data/secrets/accounts
      - ./outputs:/data/outputs
    restart: unless-stopped

  bridge-console:
    build:
      context: ./apps/bridge-console
    image: chatgpt-bridge-console:local
    depends_on:
      - chatgpt-api
    ports:
      - "${BRIDGE_CONSOLE_PORT:-8080}:80"
    restart: unless-stopped

  character-game:
    build:
      context: ./apps/character-game
    image: chatgpt-character-game:local
    depends_on:
      - chatgpt-api
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      CHATGAME_OPENAI_BASE_URL: http://chatgpt-api:8000/v1
      CHATGAME_PUBLIC_OPENAI_BASE_URL: ${CHATGPT_PUBLIC_BASE_URL:-http://127.0.0.1:8000/v1}
      CHATGAME_OPENAI_API_KEY: ${CHATGPT_API_KEY:-local-dev-key}
      CHATGAME_CHAT_MODEL: ${CHATGAME_CHAT_MODEL:-chatgpt-web/auto}
      CHATGAME_IMAGE_MODEL: ${CHATGAME_IMAGE_MODEL:-chatgpt-web/auto}
      CHATGAME_AI_MODE: ${CHATGAME_AI_MODE:-live}
      CHATGAME_DB_PATH: /data/chatgame.sqlite
      CHATGAME_IMAGE_DIR: /data/images
    ports:
      - "${CHARACTER_GAME_PORT:-3000}:3000"
    volumes:
      - ./outputs/character-game:/data
    restart: unless-stopped
